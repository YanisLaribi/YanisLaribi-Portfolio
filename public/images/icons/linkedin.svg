<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Drop Shadow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.3" />
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000" flood-opacity="0.2" />
    </filter>

    <!-- Base Gradient for the Blue Button (Glassy Vista/Win7 Blue) -->
    <linearGradient id="blueGlass" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b9fe2" />
      <stop offset="30%" stop-color="#1b7fc7" />
      <stop offset="70%" stop-color="#0a5fa3" />
      <stop offset="100%" stop-color="#05457a" />
    </linearGradient>

    <!-- Gloss Highlight Gradient (Aero Gel) -->
    <linearGradient id="gloss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.65" />
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.3" />
      <stop offset="75%" stop-color="#ffffff" stop-opacity="0.0" />
    </linearGradient>

    <!-- Inner Border Highlight (Top/Sides glowing edge) -->
    <linearGradient id="innerGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1" />
    </linearGradient>
  </defs>

  <!-- Base Plate with shadow -->
  <rect x="12" y="12" width="104" height="104" rx="22" ry="22" fill="url(#blueGlass)" filter="url(#glow)" stroke="#063d6b" stroke-width="1.5" />

  <!-- Inner border glow -->
  <rect x="14" y="14" width="100" height="100" rx="20" ry="20" fill="none" stroke="url(#innerGlow)" stroke-width="1.5" />

  <!-- The "in" Text -->
  <text x="64" y="86" font-family="'Segoe UI', -apple-system, sans-serif" font-weight="900" font-size="64" fill="#ffffff" text-anchor="middle" letter-spacing="-1">in</text>

  <!-- Aero Diagonal Gloss/Reflection Overlay -->
  <path d="M 13,34 C 13,22.4 22.4,13 34,13 L 94,13 C 105.6,13 115,22.4 115,34 C 115,48 94,54 64,54 C 34,54 13,48 13,34 Z" fill="url(#gloss)" />
</svg>
